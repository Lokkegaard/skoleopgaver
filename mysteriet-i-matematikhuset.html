<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mysteriet i Matematikhuset</title>
<style>
  :root{
    --bg:#f3f6ff;
    --ink:#1f2a44;
    --muted:#5b678a;
    --card:#ffffff;
    --accent:#ff6b35;
    --accent-soft:#ffd23f;
    --navy:#1f2a44;
    --correct:#2ec4b6;
    --wrong:#e5484d;
    --grad1:#3a86ff;
    --grad2:#8338ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .topbar{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(135deg,var(--grad1),var(--grad2));
    color:#fff;display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px;box-shadow:0 4px 14px rgba(131,56,236,.25);
  }
  .topbar .brand{font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:8px;text-decoration:none;color:#fff}
  .topbar .back{
    background:rgba(255,255,255,.18);color:#fff;text-decoration:none;
    padding:8px 14px;border-radius:999px;font-weight:600;font-size:.9rem;transition:background .15s;
  }
  .topbar .back:hover{background:rgba(255,255,255,.32)}
  .stage{max-width:720px;margin:24px auto;padding:0 16px 50px}
  .game-container{background:var(--card);border-radius:22px;overflow:hidden;box-shadow:0 10px 30px rgba(31,42,68,.12)}
  .header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:1.05rem}
  .progress-bar{height:10px;background:#e7ecf7;width:100%}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s ease}
  .room-display{position:relative;width:100%;height:280px;background:#dde4f3;overflow:hidden}
  .room-image{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
  .room-title{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;padding:22px;font-size:1.4rem;font-weight:800;box-sizing:border-box}
  .content-area{padding:26px}
  .story-text{font-size:1.08rem;margin-bottom:20px;line-height:1.6;background:#f6f8ff;padding:16px 18px;border-left:6px solid var(--accent-soft);border-radius:10px}
  .math-problem{font-weight:800;font-size:1.25rem;margin-bottom:20px;text-align:center;color:var(--navy)}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  button.option-btn{background:#eef2fb;color:var(--navy);border:2px solid transparent;padding:16px;font-size:1.15rem;font-weight:700;border-radius:14px;cursor:pointer;transition:all .15s}
  button.option-btn:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
  button.option-btn.correct{background:var(--correct)!important;color:#fff!important;border-color:transparent}
  button.option-btn.wrong{background:var(--wrong)!important;color:#fff!important;opacity:.85}
  .feedback-area{margin-top:18px;text-align:center;font-weight:700;min-height:24px}
  .next-btn{display:none;width:100%;margin-top:20px;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:1.15rem;font-weight:800;cursor:pointer;transition:filter .15s}
  .next-btn:hover{filter:brightness(1.05)}
  @media(max-width:520px){.room-display{height:200px}.room-title{font-size:1.1rem}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">🎒 Skoleopgaver</a>
  <a class="back" href="index.html">← Oversigt</a>
</div>

<div class="stage">
  <div class="game-container">
    <div class="header">
      <span>🔢 Mysteriet i Matematikhuset</span>
      <span id="score-display">Niv: 1/6</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="room-display">
      <img id="scene-img" class="room-image" src="" alt="Rummet">
      <div class="room-title" id="room-name">Indgangen</div>
    </div>
    <div class="content-area">
      <div class="story-text" id="story">Velkommen! Huset er låst. Løs gåden for at komme ind.</div>
      <div class="math-problem" id="question">Spørgsmålet kommer her...</div>
      <div class="options-grid" id="options"></div>
      <div class="feedback-area" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextRoom()">Gå til næste rum →</button>
    </div>
  </div>
</div>

<script>
    const gameData = [
        { room: "Hoveddøren", imageKeyword: "door,house,mystery",
          story: "Du står foran det gamle hus. Døren er låst med en kodelås. Du ser husnummeret 156.",
          question: "Koden er: Husnummeret plus 44, divideret med 2.",
          options: [100, 200, 80, 122], correct: 0,
          feedback: "Klik! Døren går op. (156 + 44 = 200. 200 / 2 = 100)." },
        { room: "Entreen", imageKeyword: "hallway,coatrack,interior",
          story: "Du kommer ind i entreen. Der hænger en stumtjener med 8 knager. På hver knage hænger 3 jakker. Hver jakke har 2 lommer.",
          question: "Hvor mange lommer er der i alt på alle jakkerne?",
          options: [24, 13, 48, 36], correct: 2,
          feedback: "Rigtigt! 8 knager x 3 jakker = 24 jakker. 24 x 2 lommer = 48." },
        { room: "Køkkenet", imageKeyword: "kitchen,cookies,old",
          story: "I køkkenet dufter der brændt. På bordet står en krukke med 64 magiske småkager. 4 spøgelser vil dele dem lige.",
          question: "Hvor mange småkager får hvert spøgelse?",
          options: [12, 16, 14, 20], correct: 1,
          feedback: "Mums! 64 divideret med 4 er 16." },
        { room: "Biblioteket", imageKeyword: "library,books,mystery",
          story: "En gammel bog ligger åben. 'Jeg tænker på et tal', står der. 'Gang mig med 5 og træk 10 fra, så får du 40.'",
          question: "Hvilket tal tænker bogen på?",
          options: [8, 50, 6, 10], correct: 3,
          feedback: "Korrekt! 10 x 5 = 50. 50 - 10 = 40." },
        { room: "Tårnværelset", imageKeyword: "stairs,tower,window",
          story: "Du løber op ad trappen. Der er 100 trin. 15 er i stykker, og 7 mangler helt.",
          question: "Hvor mange trin kan man træde sikkert på?",
          options: [78, 85, 93, 22], correct: 0,
          feedback: "Godt gået! 100 - 15 - 7 = 78 trin." },
        { room: "Skattekammeret", imageKeyword: "treasure,chest,gold",
          story: "Du fandt skatten! Men for at åbne kisten skal du lægge fire tal på væggen sammen: 125, 250, 75 og 50.",
          question: "Hvad er summen af tallene?",
          options: [400, 500, 450, 525], correct: 1,
          feedback: "Kisten åbner sig! Du har vundet! (125+75=200, 250+50=300, i alt 500)." }
    ];

    let currentLevel = 0;
    let score = 0;
    let canClick = true;

    const imgEl = document.getElementById('scene-img');
    const roomTitleEl = document.getElementById('room-name');
    const storyEl = document.getElementById('story');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score-display');

    function loadLevel(index) {
        if (index >= gameData.length) { endGame(); return; }
        const data = gameData[index];
        canClick = true;
        nextBtn.style.display = "none";
        feedbackEl.innerHTML = "";
        feedbackEl.style.color = "inherit";
        roomTitleEl.innerText = data.room;
        storyEl.innerText = data.story;
        questionEl.innerText = data.question;
        scoreEl.innerText = `Niv: ${index + 1}/${gameData.length}`;
        progressEl.style.width = ((index / gameData.length) * 100) + "%";
        imgEl.src = `https://loremflickr.com/600/300/${data.imageKeyword}?random=${index}`;
        optionsEl.innerHTML = "";
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (!canClick) return;
        canClick = false;
        const data = gameData[currentLevel];
        const buttons = document.querySelectorAll('.option-btn');
        if (selectedIndex === data.correct) {
            btnElement.classList.add('correct');
            feedbackEl.innerText = data.feedback;
            feedbackEl.style.color = "var(--correct)";
            score++;
            nextBtn.style.display = "block";
        } else {
            btnElement.classList.add('wrong');
            buttons[data.correct].classList.add('correct');
            feedbackEl.innerText = "Desværre forkert. Det rigtige svar er markeret.";
            feedbackEl.style.color = "var(--wrong)";
            nextBtn.style.display = "block";
        }
    }

    function nextRoom() { currentLevel++; loadLevel(currentLevel); }

    function endGame() {
        document.querySelector('.game-container').innerHTML = `
            <div class="header"><span>🎉 Tillykke!</span></div>
            <div class="room-display">
                <img class="room-image" src="https://loremflickr.com/600/300/fireworks" alt="Sejr">
            </div>
            <div class="content-area" style="text-align:center;">
                <h2 style="color:var(--navy);margin-bottom:8px;">Du gennemførte spillet!</h2>
                <p style="color:var(--muted);">Du kom igennem alle rummene i Matematikhuset.</p>
                <button class="next-btn" style="display:block;" onclick="location.reload()">Spil igen</button>
            </div>
        `;
    }

    loadLevel(0);
</script>

</body>
</html>
