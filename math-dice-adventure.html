<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Dice Adventure</title>
<style>
  :root{--bg:#f3f6ff;--ink:#1f2a44;--muted:#5b678a;--card:#fff;--accent:#ff6b35;--navy:#1f2a44;--correct:#2ec4b6;--wrong:#e5484d;--grad1:#3a86ff;--grad2:#8338ec}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--grad1),var(--grad2));color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 4px 14px rgba(131,56,236,.25)}
  .topbar .brand{font-weight:700;font-size:1.05rem;text-decoration:none;color:#fff}
  .topbar .back{background:rgba(255,255,255,.18);color:#fff;text-decoration:none;padding:8px 14px;border-radius:999px;font-weight:600;font-size:.9rem}
  .topbar .back:hover{background:rgba(255,255,255,.32)}
  .wrap{display:flex;justify-content:center;padding:28px 16px 50px}
  .game-container{background:var(--card);border-radius:22px;padding:30px;box-shadow:0 10px 30px rgba(31,42,68,.12);max-width:800px;width:100%;text-align:center}
  h1{color:var(--navy);font-size:2.2rem;margin-bottom:20px}
  .stats{display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px;margin-bottom:26px;background:#f6f8ff;padding:16px;border-radius:14px}
  .stat{text-align:center;min-width:90px}
  .stat-value{font-size:1.5rem;font-weight:800;color:var(--accent)}
  .stat div:first-child{color:var(--muted);font-size:.9rem}
  .dice-container{display:flex;justify-content:center;flex-wrap:wrap;gap:15px;margin:26px 0}
  .dice{width:60px;height:60px;background:var(--navy);border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:1.8rem;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;border:3px solid #fff;box-shadow:0 4px 8px rgba(0,0,0,.15)}
  .dice:hover{transform:translateY(-5px)}
  .dice.selected{background:var(--correct);transform:scale(1.1)}
  .operation-buttons{display:flex;justify-content:center;gap:10px;margin:20px 0}
  .op-btn{padding:10px 20px;font-size:1.5rem;border:none;border-radius:999px;cursor:pointer;transition:all .2s;font-weight:800;color:#fff;background:var(--accent)}
  .op-btn:hover{transform:translateY(-2px)}
  .op-btn.selected{background:var(--grad1)}
  .problem{font-size:2rem;margin:26px 0;padding:20px;background:#eef2fb;border-radius:14px;color:var(--navy);font-weight:800;min-height:80px;display:flex;align-items:center;justify-content:center}
  .input-area{margin:20px 0}
  .answer-input{font-size:1.5rem;padding:14px;border:2px solid #dbe2f1;border-radius:12px;width:200px;text-align:center;margin:0 10px}
  .answer-input:focus{outline:none;border-color:var(--accent)}
  .btn{padding:12px 28px;font-size:1.1rem;border:none;border-radius:999px;cursor:pointer;transition:all .2s;font-weight:700;color:#fff;margin:5px}
  .btn-primary{background:var(--accent)}
  .btn-success{background:var(--correct)}
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .feedback{font-size:1.2rem;margin:20px 0;padding:14px;border-radius:12px;font-weight:700;min-height:50px;display:flex;align-items:center;justify-content:center}
  .correct{background:var(--correct);color:#fff}
  .incorrect{background:var(--wrong);color:#fff}
  .rewards{min-height:34px;margin:14px 0;color:var(--correct);font-weight:800;font-size:1.3rem}
  .level-up{background:var(--accent-soft,#ffd23f);color:var(--navy);padding:18px;border-radius:14px;margin:6px 0;font-size:1.3rem;font-weight:800}
  .instructions{background:#f6f8ff;padding:15px;border-radius:12px;margin-bottom:20px;color:var(--muted);font-size:1.05rem;line-height:1.5}
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="index.html">Skoleopgaver</a>
    <a class="back" href="index.html">← Oversigt</a>
  </div>

  <div class="wrap">
    <div class="game-container">
      <h1>Math Dice Adventure</h1>

      <div class="stats">
        <div class="stat"><div>Niveau</div><div class="stat-value" id="level">1</div></div>
        <div class="stat"><div>Point</div><div class="stat-value" id="score">0</div></div>
        <div class="stat"><div>I træk</div><div class="stat-value" id="streak">0</div></div>
        <div class="stat"><div>Løste opgaver</div><div class="stat-value" id="problems-solved">0</div></div>
      </div>

      <div class="instructions">
        Vælg to terninger, vælg et regnetegn (+, -, ×, ÷), og løs opgaven.
        <br>Få 5 rigtige i et niveau for at rykke op og få flere terninger.
      </div>

      <div class="dice-container" id="dice-container"></div>

      <div class="operation-buttons">
        <button class="op-btn" data-op="+" title="Plus">+</button>
        <button class="op-btn" data-op="-" title="Minus">-</button>
        <button class="op-btn" data-op="*" title="Gange">×</button>
        <button class="op-btn" data-op="/" title="Division">÷</button>
      </div>

      <div class="problem" id="problem">Vælg to terninger og et regnetegn for at lave en opgave!</div>

      <div class="input-area">
        <input type="number" class="answer-input" id="answer-input" placeholder="Dit svar" disabled>
        <button class="btn btn-primary" id="submit-btn" disabled>Tjek svar</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="rewards" id="rewards"></div>

      <button class="btn btn-success" id="new-problem-btn" onclick="generateDiceValues()">Slå nye terninger</button>
    </div>
  </div>

  <script>
    let gameState = {
        level: 1, score: 0, streak: 0, problemsSolved: 0,
        selectedDice: [], selectedOperation: null, currentProblem: null,
        diceCount: 2, diceValues: []
    };

    function initGame() { generateDiceValues(); updateDisplay(); }

    function generateDiceValues() {
        gameState.diceValues = [];
        for (let i = 0; i < gameState.diceCount; i++) {
            gameState.diceValues.push(Math.floor(Math.random() * 6) + 1);
        }
        renderDice();
        resetSelection();
    }

    function renderDice() {
        const container = document.getElementById('dice-container');
        container.innerHTML = '';
        gameState.diceValues.forEach((value, index) => {
            const dice = document.createElement('div');
            dice.className = 'dice';
            dice.textContent = value;
            dice.onclick = () => selectDice(index);
            dice.dataset.index = index;
            container.appendChild(dice);
        });
    }

    function selectDice(index) {
        const dice = document.querySelector(`[data-index="${index}"]`);
        if (gameState.selectedDice.includes(index)) {
            gameState.selectedDice = gameState.selectedDice.filter(i => i !== index);
            dice.classList.remove('selected');
        } else if (gameState.selectedDice.length < 2) {
            gameState.selectedDice.push(index);
            dice.classList.add('selected');
        }
        updateProblem();
    }

    function selectOperation(op) {
        document.querySelectorAll('.op-btn').forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
        gameState.selectedOperation = op;
        updateProblem();
    }

    function updateProblem() {
        const problemDiv = document.getElementById('problem');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        if (gameState.selectedDice.length === 2 && gameState.selectedOperation) {
            const num1 = gameState.diceValues[gameState.selectedDice[0]];
            const num2 = gameState.diceValues[gameState.selectedDice[1]];
            const op = gameState.selectedOperation;
            let displayOp = op === '*' ? '×' : op === '/' ? '÷' : op;
            if (op === '/' && num1 % num2 !== 0) {
                const adjustedNum1 = num2 * Math.floor(Math.random() * 6 + 1);
                gameState.currentProblem = { num1: adjustedNum1, num2: num2, operation: op, answer: adjustedNum1 / num2 };
                problemDiv.textContent = `${adjustedNum1} ${displayOp} ${num2} = ?`;
            } else {
                let answer;
                switch (op) {
                    case '+': answer = num1 + num2; break;
                    case '-': answer = num1 - num2; break;
                    case '*': answer = num1 * num2; break;
                    case '/': answer = num1 / num2; break;
                }
                gameState.currentProblem = { num1, num2, operation: op, answer };
                problemDiv.textContent = `${num1} ${displayOp} ${num2} = ?`;
            }
            answerInput.disabled = false;
            submitBtn.disabled = false;
            answerInput.focus();
        } else {
            problemDiv.textContent = 'Vælg to terninger og et regnetegn for at lave en opgave!';
            answerInput.disabled = true;
            submitBtn.disabled = true;
        }
    }

    function checkAnswer() {
        const userAnswer = parseFloat(document.getElementById('answer-input').value);
        const correctAnswer = gameState.currentProblem.answer;
        const feedbackDiv = document.getElementById('feedback');
        const rewardsDiv = document.getElementById('rewards');
        if (Math.abs(userAnswer - correctAnswer) < 0.01) {
            feedbackDiv.textContent = 'Rigtigt! Godt klaret!';
            feedbackDiv.className = 'feedback correct';
            const points = 10 * gameState.level;
            gameState.score += points;
            gameState.streak += 1;
            gameState.problemsSolved += 1;
            rewardsDiv.textContent = `+${points} point`;
            if (gameState.problemsSolved % 5 === 0) { levelUp(); }
        } else {
            feedbackDiv.textContent = `Ikke helt rigtigt. Svaret var ${correctAnswer}. Prøv igen!`;
            feedbackDiv.className = 'feedback incorrect';
            gameState.streak = 0;
            rewardsDiv.textContent = '';
        }
        updateDisplay();
        resetForNextProblem();
    }

    function levelUp() {
        gameState.level += 1;
        if (gameState.diceCount < 6) { gameState.diceCount += 1; }
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.innerHTML = `<div class="level-up">Niveau op! Du er nu på niveau ${gameState.level} med ${gameState.diceCount} terninger!</div>`;
        generateDiceValues();
    }

    function resetForNextProblem() {
        setTimeout(() => {
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').disabled = true;
            document.getElementById('submit-btn').disabled = true;
        }, 2000);
    }

    function resetSelection() {
        gameState.selectedDice = [];
        gameState.selectedOperation = null;
        gameState.currentProblem = null;
        document.querySelectorAll('.dice').forEach(dice => dice.classList.remove('selected'));
        document.querySelectorAll('.op-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('problem').textContent = 'Vælg to terninger og et regnetegn for at lave en opgave!';
        document.getElementById('feedback').textContent = '';
        document.getElementById('rewards').textContent = '';
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').disabled = true;
        document.getElementById('submit-btn').disabled = true;
    }

    function updateDisplay() {
        document.getElementById('level').textContent = gameState.level;
        document.getElementById('score').textContent = gameState.score.toLocaleString();
        document.getElementById('streak').textContent = gameState.streak;
        document.getElementById('problems-solved').textContent = gameState.problemsSolved;
    }

    document.querySelectorAll('.op-btn').forEach(btn => { btn.onclick = () => selectOperation(btn.dataset.op); });
    document.getElementById('submit-btn').onclick = checkAnswer;
    document.getElementById('answer-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !this.disabled) { checkAnswer(); }
    });

    initGame();
  </script>
</body>
</html>
