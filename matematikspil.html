<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Ekspres - 4. Klasse</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .problem-card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 30px;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .problem-card:hover {
            transform: scale(1.02);
        }

        .problem-text {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .answer-input {
            font-size: 1.5rem;
            padding: 15px;
            border: 3px solid #ddd;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
        }

        .answer-input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff9800, #e68900);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            min-height: 50px;
            transition: all 0.5s ease;
        }

        .feedback.correct {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            animation: pulse 0.6s ease-in-out;
        }

        .feedback.incorrect {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
            animation: shake 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .game-over {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .level-badge {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .problem-text { font-size: 1.5rem; }
            .answer-input { width: 150px; font-size: 1.3rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Matematik Ekspres</h1>
        <p>Løs opgaverne og bliv matematik-mester!</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="score">0</div>
            <div>Point</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="streak">0</div>
            <div>I træk</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="level">1</div>
            <div>Level</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="highScore">0</div>
            <div>Bedste</div>
        </div>
    </div>

    <div class="game-area">
        <div class="level-badge" id="levelBadge">Level 1: Addition & Subtraktion</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <div class="problem-card" id="problemCard">
            <div class="problem-text" id="problemText">Klik Start for at begynde!</div>
            <input type="number" class="answer-input" id="answerInput" style="display: none;">
            <div>
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎯 Start Spil</button>
                <button class="btn btn-primary" id="submitBtn" onclick="checkAnswer()" style="display: none;">✅ Tjek Svar</button>
                <button class="btn btn-secondary" id="skipBtn" onclick="skipProblem()" style="display: none;">⏭️ Spring Over</button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        // Game state
        let gameState = {
            score: 0,
            streak: 0,
            level: 1,
            currentProblem: null,
            problemsInLevel: 0,
            totalProblems: 0
        };

        // Problem types based on the worksheet image
        const problemTypes = {
            level1: [
                // Simple addition (Opgave 1 style)
                { type: 'add', range: [10, 99], operation: '+' },
                { type: 'subtract', range: [10, 99], operation: '-' }
            ],
            level2: [
                // Find missing number (Opgave 3 style)
                { type: 'missing_add', range: [20, 100], operation: '+' },
                { type: 'subtract_large', range: [100, 999], operation: '-' }
            ],
            level3: [
                // Large number operations (Opgave 4 style)
                { type: 'large_subtract', range: [1000, 9999], operation: '-' },
                { type: 'complex_add', range: [1000, 5000], operation: '+' }
            ]
        };

        // Load high score from localStorage
        function loadHighScore() {
            const saved = localStorage.getItem('matematikHighScore');
            if (saved) {
                gameState.highScore = parseInt(saved);
                document.getElementById('highScore').textContent = gameState.highScore;
            }
        }

        // Save high score to localStorage
        function saveHighScore() {
            if (gameState.score > (gameState.highScore || 0)) {
                gameState.highScore = gameState.score;
                localStorage.setItem('matematikHighScore', gameState.highScore);
                document.getElementById('highScore').textContent = gameState.highScore;
            }
        }

        // Generate random problem based on level
        function generateProblem() {
            const levelProblems = problemTypes[`level${gameState.level}`];
            const problemType = levelProblems[Math.floor(Math.random() * levelProblems.length)];
            
            let problem = {};
            
            switch(problemType.type) {
                case 'add':
                    const a = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                    const b = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                    problem = {
                        text: `${a} + ${b} = ?`,
                        answer: a + b
                    };
                    break;
                    
                case 'subtract':
                    const x = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                    const y = Math.floor(Math.random() * x) + 1;
                    problem = {
                        text: `${x} - ${y} = ?`,
                        answer: x - y
                    };
                    break;
                    
                case 'missing_add':
                    const num1 = Math.floor(Math.random() * 50) + 20;
                    const total = Math.floor(Math.random() * 50) + 70;
                    problem = {
                        text: `${num1} + ? = ${total}`,
                        answer: total - num1
                    };
                    break;
                    
                case 'subtract_large':
                    const large1 = Math.floor(Math.random() * 900) + 100;
                    const large2 = Math.floor(Math.random() * (large1 - 10)) + 10;
                    problem = {
                        text: `${large1} - ${large2} = ?`,
                        answer: large1 - large2
                    };
                    break;
                    
                case 'large_subtract':
                    const big1 = Math.floor(Math.random() * 9000) + 1000;
                    const subtract = Math.floor(Math.random() * 1000) + 1;
                    problem = {
                        text: `${big1} - ${subtract} = ?`,
                        answer: big1 - subtract
                    };
                    break;
                    
                case 'complex_add':
                    const c1 = Math.floor(Math.random() * 4000) + 1000;
                    const c2 = Math.floor(Math.random() * 4000) + 1000;
                    problem = {
                        text: `${c1} + ${c2} = ?`,
                        answer: c1 + c2
                    };
                    break;
            }
            
            return problem;
        }

        // Start the game
        function startGame() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('skipBtn').style.display = 'inline-block';
            document.getElementById('answerInput').style.display = 'inline-block';
            document.getElementById('answerInput').focus();
            
            loadHighScore();
            nextProblem();
        }

        // Generate next problem
        function nextProblem() {
            gameState.currentProblem = generateProblem();
            gameState.problemsInLevel++;
            gameState.totalProblems++;
            
            document.getElementById('problemText').textContent = gameState.currentProblem.text;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            
            updateProgress();
        }

        // Check the answer
        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            const feedback = document.getElementById('feedback');
            
            if (isNaN(userAnswer)) {
                feedback.textContent = '⚠️ Indtast venligst et tal!';
                feedback.className = 'feedback incorrect';
                return;
            }
            
            if (userAnswer === gameState.currentProblem.answer) {
                // Correct answer
                gameState.score += 1;
                gameState.streak += 1;
                
                // Streak bonus
                if (gameState.streak >= 3) {
                    gameState.score += 1;
                    feedback.textContent = `🎉 Korrekt! +1 bonus for ${gameState.streak} i træk!`;
                } else {
                    feedback.textContent = '✅ Rigtigt! Godt klaret!';
                }
                feedback.className = 'feedback correct';
                
                updateStats();
                
                // Check for level up (every 5 problems)
                if (gameState.problemsInLevel >= 5 && gameState.level < 3) {
                    levelUp();
                } else {
                    setTimeout(nextProblem, 1500);
                }
                
            } else {
                // Wrong answer
                gameState.streak = 0;
                feedback.textContent = `❌ Ikke helt rigtigt. Svaret er ${gameState.currentProblem.answer}`;
                feedback.className = 'feedback incorrect';
                updateStats();
                setTimeout(nextProblem, 2000);
            }
            
            saveHighScore();
        }

        // Skip problem
        function skipProblem() {
            gameState.streak = 0;
            document.getElementById('feedback').textContent = `⏭️ Sprunget over. Svaret var ${gameState.currentProblem.answer}`;
            document.getElementById('feedback').className = 'feedback incorrect';
            updateStats();
            setTimeout(nextProblem, 1500);
        }

        // Level up
        function levelUp() {
            gameState.level++;
            gameState.problemsInLevel = 0;
            
            const levelNames = {
                2: 'Level 2: Avanceret Regning',
                3: 'Level 3: Store Tal'
            };
            
            document.getElementById('levelBadge').textContent = levelNames[gameState.level];
            document.getElementById('feedback').textContent = `🆙 Level ${gameState.level} låst op! Godt klaret!`;
            document.getElementById('feedback').className = 'feedback correct';
            
            updateStats();
            setTimeout(nextProblem, 2000);
        }

        // Update statistics display
        function updateStats() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('streak').textContent = gameState.streak;
            document.getElementById('level').textContent = gameState.level;
        }

        // Update progress bar
        function updateProgress() {
            const progressPercent = (gameState.problemsInLevel / 5) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';
        }

        // Handle Enter key for submission
        document.getElementById('answerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Initialize
        loadHighScore();
    </script>
</body>
</html>
