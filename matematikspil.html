<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematikspil</title>
<style>
  :root{
    --bg:#f3f6ff;--ink:#1f2a44;--muted:#5b678a;--card:#fff;
    --accent:#ff6b35;--navy:#1f2a44;--correct:#2ec4b6;--wrong:#e5484d;
    --grad1:#3a86ff;--grad2:#8338ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;color:var(--ink);-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--grad1),var(--grad2));color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 4px 14px rgba(131,56,236,.25)}
  .topbar .brand{font-weight:700;font-size:1.05rem;text-decoration:none;color:#fff}
  .topbar .back{background:rgba(255,255,255,.18);color:#fff;text-decoration:none;padding:8px 14px;border-radius:999px;font-weight:600;font-size:.9rem}
  .topbar .back:hover{background:rgba(255,255,255,.32)}
  .header{text-align:center;padding:28px 20px 6px}
  .header h1{font-size:2.2rem;margin-bottom:6px;color:var(--navy)}
  .header p{color:var(--muted)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:20px auto;max-width:720px;width:100%;padding:0 20px}
  .stat-card{background:var(--card);padding:16px;border-radius:16px;text-align:center;box-shadow:0 4px 14px rgba(31,42,68,.08)}
  .stat-number{font-size:2rem;font-weight:800;margin-bottom:4px;color:var(--accent)}
  .stat-card div:last-child{color:var(--muted);font-size:.9rem}
  .game-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 20px 50px}
  .level-badge{background:var(--navy);color:#fff;padding:8px 16px;border-radius:999px;font-size:.95rem;font-weight:600;margin-bottom:18px;display:inline-block}
  .progress-bar{width:100%;max-width:420px;height:14px;background:#e7ecf7;border-radius:999px;overflow:hidden;margin:10px 0 24px}
  .progress-fill{height:100%;background:var(--accent);transition:width .5s ease;border-radius:999px}
  .problem-card{background:var(--card);color:var(--ink);padding:34px 30px;border-radius:22px;box-shadow:0 10px 30px rgba(31,42,68,.12);text-align:center;max-width:520px;width:100%;margin-bottom:24px}
  .problem-text{font-size:1.9rem;margin-bottom:22px;font-weight:800;color:var(--navy)}
  .answer-input{font-size:1.5rem;padding:14px;border:2px solid #dbe2f1;border-radius:12px;text-align:center;width:200px;margin-bottom:20px}
  .answer-input:focus{outline:none;border-color:var(--accent)}
  .btn{padding:14px 28px;font-size:1.1rem;border:none;border-radius:12px;cursor:pointer;margin:8px;transition:all .15s;font-weight:700}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.05)}
  .btn-secondary{background:#eef2fb;color:var(--navy)}
  .btn-secondary:hover{transform:translateY(-2px)}
  .feedback{padding:14px;border-radius:12px;margin-top:18px;font-size:1.2rem;font-weight:700;text-align:center;min-height:50px;max-width:520px;width:100%}
  .feedback.correct{background:var(--correct);color:#fff;animation:pulse .6s ease-in-out}
  .feedback.incorrect{background:var(--wrong);color:#fff;animation:shake .6s ease-in-out}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @media(max-width:768px){.header h1{font-size:1.8rem}.problem-text{font-size:1.5rem}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="index.html">Skoleopgaver</a>
    <a class="back" href="index.html">← Oversigt</a>
  </div>

  <div class="header">
    <h1>Matematik Ekspres</h1>
    <p>Løs opgaverne og bliv matematik-mester!</p>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-number" id="score">0</div><div>Point</div></div>
    <div class="stat-card"><div class="stat-number" id="streak">0</div><div>I træk</div></div>
    <div class="stat-card"><div class="stat-number" id="level">1</div><div>Level</div></div>
    <div class="stat-card"><div class="stat-number" id="highScore">0</div><div>Bedste</div></div>
  </div>

  <div class="game-area">
    <div class="level-badge" id="levelBadge">Level 1: Addition & Subtraktion</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>
    <div class="problem-card" id="problemCard">
      <div class="problem-text" id="problemText">Klik Start for at begynde!</div>
      <input type="number" class="answer-input" id="answerInput" style="display: none;">
      <div>
        <button class="btn btn-primary" id="startBtn" onclick="startGame()">Start spil</button>
        <button class="btn btn-primary" id="submitBtn" onclick="checkAnswer()" style="display: none;">Tjek svar</button>
        <button class="btn btn-secondary" id="skipBtn" onclick="skipProblem()" style="display: none;">Spring over</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    let gameState = { score: 0, streak: 0, level: 1, currentProblem: null, problemsInLevel: 0, totalProblems: 0 };

    const problemTypes = {
        level1: [
            { type: 'add', range: [10, 99], operation: '+' },
            { type: 'subtract', range: [10, 99], operation: '-' }
        ],
        level2: [
            { type: 'missing_add', range: [20, 100], operation: '+' },
            { type: 'subtract_large', range: [100, 999], operation: '-' }
        ],
        level3: [
            { type: 'large_subtract', range: [1000, 9999], operation: '-' },
            { type: 'complex_add', range: [1000, 5000], operation: '+' }
        ]
    };

    function loadHighScore() {
        const saved = localStorage.getItem('matematikHighScore');
        if (saved) {
            gameState.highScore = parseInt(saved);
            document.getElementById('highScore').textContent = gameState.highScore;
        }
    }
    function saveHighScore() {
        if (gameState.score > (gameState.highScore || 0)) {
            gameState.highScore = gameState.score;
            localStorage.setItem('matematikHighScore', gameState.highScore);
            document.getElementById('highScore').textContent = gameState.highScore;
        }
    }
    function generateProblem() {
        const levelProblems = problemTypes[`level${gameState.level}`];
        const problemType = levelProblems[Math.floor(Math.random() * levelProblems.length)];
        let problem = {};
        switch(problemType.type) {
            case 'add': {
                const a = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                const b = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                problem = { text: `${a} + ${b} = ?`, answer: a + b }; break; }
            case 'subtract': {
                const x = Math.floor(Math.random() * (problemType.range[1] - problemType.range[0])) + problemType.range[0];
                const y = Math.floor(Math.random() * x) + 1;
                problem = { text: `${x} - ${y} = ?`, answer: x - y }; break; }
            case 'missing_add': {
                const num1 = Math.floor(Math.random() * 50) + 20;
                const total = Math.floor(Math.random() * 50) + 70;
                problem = { text: `${num1} + ? = ${total}`, answer: total - num1 }; break; }
            case 'subtract_large': {
                const large1 = Math.floor(Math.random() * 900) + 100;
                const large2 = Math.floor(Math.random() * (large1 - 10)) + 10;
                problem = { text: `${large1} - ${large2} = ?`, answer: large1 - large2 }; break; }
            case 'large_subtract': {
                const big1 = Math.floor(Math.random() * 9000) + 1000;
                const subtract = Math.floor(Math.random() * 1000) + 1;
                problem = { text: `${big1} - ${subtract} = ?`, answer: big1 - subtract }; break; }
            case 'complex_add': {
                const c1 = Math.floor(Math.random() * 4000) + 1000;
                const c2 = Math.floor(Math.random() * 4000) + 1000;
                problem = { text: `${c1} + ${c2} = ?`, answer: c1 + c2 }; break; }
        }
        return problem;
    }
    function startGame() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'inline-block';
        document.getElementById('skipBtn').style.display = 'inline-block';
        document.getElementById('answerInput').style.display = 'inline-block';
        document.getElementById('answerInput').focus();
        loadHighScore();
        nextProblem();
    }
    function nextProblem() {
        gameState.currentProblem = generateProblem();
        gameState.problemsInLevel++;
        gameState.totalProblems++;
        document.getElementById('problemText').textContent = gameState.currentProblem.text;
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').focus();
        document.getElementById('feedback').textContent = '';
        document.getElementById('feedback').className = 'feedback';
        updateProgress();
    }
    function checkAnswer() {
        const userAnswer = parseInt(document.getElementById('answerInput').value);
        const feedback = document.getElementById('feedback');
        if (isNaN(userAnswer)) {
            feedback.textContent = 'Indtast venligst et tal!';
            feedback.className = 'feedback incorrect';
            return;
        }
        if (userAnswer === gameState.currentProblem.answer) {
            gameState.score += 1;
            gameState.streak += 1;
            if (gameState.streak >= 3) {
                gameState.score += 1;
                feedback.textContent = `Korrekt! +1 bonus for ${gameState.streak} i træk!`;
            } else {
                feedback.textContent = 'Rigtigt! Godt klaret!';
            }
            feedback.className = 'feedback correct';
            updateStats();
            if (gameState.problemsInLevel >= 5 && gameState.level < 3) {
                levelUp();
            } else {
                setTimeout(nextProblem, 1500);
            }
        } else {
            gameState.streak = 0;
            feedback.textContent = `Ikke helt rigtigt. Svaret er ${gameState.currentProblem.answer}`;
            feedback.className = 'feedback incorrect';
            updateStats();
            setTimeout(nextProblem, 2000);
        }
        saveHighScore();
    }
    function skipProblem() {
        gameState.streak = 0;
        document.getElementById('feedback').textContent = `Sprunget over. Svaret var ${gameState.currentProblem.answer}`;
        document.getElementById('feedback').className = 'feedback incorrect';
        updateStats();
        setTimeout(nextProblem, 1500);
    }
    function levelUp() {
        gameState.level++;
        gameState.problemsInLevel = 0;
        const levelNames = { 2: 'Level 2: Avanceret Regning', 3: 'Level 3: Store Tal' };
        document.getElementById('levelBadge').textContent = levelNames[gameState.level];
        document.getElementById('feedback').textContent = `Level ${gameState.level} låst op! Godt klaret!`;
        document.getElementById('feedback').className = 'feedback correct';
        updateStats();
        setTimeout(nextProblem, 2000);
    }
    function updateStats() {
        document.getElementById('score').textContent = gameState.score;
        document.getElementById('streak').textContent = gameState.streak;
        document.getElementById('level').textContent = gameState.level;
    }
    function updateProgress() {
        const progressPercent = (gameState.problemsInLevel / 5) * 100;
        document.getElementById('progressFill').style.width = progressPercent + '%';
    }
    document.getElementById('answerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { checkAnswer(); }
    });
    loadHighScore();
  </script>
</body>
</html>
